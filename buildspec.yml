version: 0.2

phases:
  install:
    commands:
      - echo Installing...
      - docker --version
  pre_build:
    commands:
      - echo Listing files
      - ls -la
  build:
    commands:
      - echo Building Docker image
      - docker build -t myapp .
      - echo Running container
      - docker run myapp
  post_build:
    commands:
      - echo Done
